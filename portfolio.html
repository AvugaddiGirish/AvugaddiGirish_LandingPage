<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIRISH — AI Automation Engineer</title>
  <meta name="description" content="Avugaddi Girish — AI Automation Engineer. Interactive 2D vector portfolio.">

  <meta property="og:title" content="GIRISH — AI Automation Engineer">
  <meta property="og:description"
    content="Portfolio of Avugaddi Girish. Exploring AI, Python automation, and generative design.">
  <meta property="og:image" content="https://yourwebsite.com/preview.png">
  <meta property="og:url" content="https://yourwebsite.com">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      background: #0D0D0D;
      color: #F5F5F5;
      cursor: default;
    }

    /* ═══════════════════════════════════════════════════
   MAIN VIEWPORT
   ═══════════════════════════════════════════════════ */
    #viewport {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ═══════════════════════════════════════════════════
   GENERATIVE BACKGROUND CANVAS
   ═══════════════════════════════════════════════════ */
    #bgCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════════
   CENTERPIECE SVG TITLE
   ═══════════════════════════════════════════════════ */
    #titleWrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      user-select: none;
    }

    #mainTitle {
      width: min(90vw, 1100px);
      height: auto;
      overflow: visible;
    }

    #mainTitle text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
    }

    .title-stroke {
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
      animation: strokeDraw 3s ease forwards, strokeLoop 8s ease-in-out 3s infinite alternate;
    }

    .stroke-yellow {
      stroke: #FFE500;
    }

    .stroke-pink {
      stroke: #FF2D6B;
    }

    .stroke-cyan {
      stroke: #00F0FF;
    }

    .title-fill {
      fill: #F5F5F5;
      opacity: 0;
      animation: fillReveal 1s ease 2.4s forwards;
    }

    @keyframes strokeDraw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes strokeLoop {

      0%,
      100% {
        stroke-dashoffset: 0;
      }

      50% {
        stroke-dashoffset: 120;
      }
    }

    @keyframes fillReveal {
      to {
        opacity: 1;
      }
    }

    /* Subtitle */
    .subtitle {
      font-size: clamp(0.7rem, 1.4vw, 1.1rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #888;
      opacity: 0;
      animation: fadeUp 1s ease 3s forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ═══════════════════════════════════════════════════
   FLOATING NAV OBJECTS
   ═══════════════════════════════════════════════════ */
    .nav-object {
      position: absolute;
      z-index: 5;
      cursor: inherit;
      transition: transform 0.35s cubic-bezier(.22, 1, .36, 1), filter 0.35s ease;
      animation: floatIdle 6s ease-in-out infinite;
      filter: drop-shadow(0 0 0px transparent);
      outline: none;
    }

    .nav-object:hover,
    .nav-object:focus-visible {
      transform: scale(1.22) !important;
      filter: drop-shadow(0 0 18px currentColor);
    }

    .nav-object svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Positioning */
    .nav-obj-1 {
      top: 14%;
      left: 8%;
      width: 80px;
      height: 80px;
      color: #FFE500;
      animation-delay: 0s;
    }

    .nav-obj-2 {
      top: 12%;
      right: 9%;
      width: 72px;
      height: 72px;
      color: #FF2D6B;
      animation-delay: 1.5s;
    }

    .nav-obj-3 {
      bottom: 16%;
      left: 10%;
      width: 68px;
      height: 68px;
      color: #00F0FF;
      animation-delay: 3s;
    }

    .nav-obj-4 {
      bottom: 14%;
      right: 8%;
      width: 76px;
      height: 76px;
      color: #FFE500;
      animation-delay: 4.5s;
    }

    /* Labels */
    .nav-label {
      position: absolute;
      left: 50%;
      bottom: -22px;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: inherit;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .nav-object:hover .nav-label,
    .nav-object:focus-visible .nav-label {
      opacity: 1;
    }

    @keyframes floatIdle {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      25% {
        transform: translateY(-10px) rotate(3deg);
      }

      75% {
        transform: translateY(6px) rotate(-2deg);
      }
    }

    .shape-line {
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: shapeStrokeDraw 1.8s ease forwards;
    }

    .solid-stroke {
      stroke-dasharray: none;
      stroke-dashoffset: 0;
      animation: none;
    }

    .shape-fill {
      fill: currentColor;
      opacity: 0.12;
    }

    @keyframes shapeStrokeDraw {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* ═══════════════════════════════════════════════════
   SVG ANIMATION DEFINITIONS
   ═══════════════════════════════════════════════════ */
    /* F1 */
    .wheel-rear {
      transform-origin: 22px 50px;
    }

    .wheel-front {
      transform-origin: 62px 50px;
    }

    @keyframes wheelSpin {
      to {
        transform: rotate(360deg);
      }
    }

    .smoke-container {
      position: absolute;
      bottom: 25px;
      left: -10px;
      width: 20px;
      height: 20px;
      pointer-events: none;
      z-index: -1;
    }

    .smoke-particle {
      position: absolute;
      background: #F5F5F5;
      border-radius: 50%;
      opacity: 0.6;
      animation: smokeAnim 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    @keyframes smokeAnim {
      0% {
        transform: scale(0.5) translate(0, 0);
        opacity: 0.7;
      }

      100% {
        transform: scale(3.5) translate(-15px, -8px);
        opacity: 0;
      }
    }

    /* Avatar */
    .avatar-hair-group {
      transform-origin: 36px 36px;
      transition: transform 0.3s ease;
    }

    @keyframes rgbGlow {

      0%,
      100% {
        stroke: #FF0000;
        filter: drop-shadow(0 0 4px #FF0000);
      }

      33% {
        stroke: #00FF00;
        filter: drop-shadow(0 0 4px #00FF00);
      }

      66% {
        stroke: #0000FF;
        filter: drop-shadow(0 0 4px #0000FF);
      }
    }

    @keyframes hairWave {
      0% {
        transform: skewX(-5deg) rotate(-2deg);
      }

      100% {
        transform: skewX(12deg) rotate(6deg);
      }
    }

    .wind-container {
      position: absolute;
      top: 0;
      left: -20px;
      width: 110px;
      height: 72px;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
      border-radius: 10px;
    }

    .wind-particle {
      position: absolute;
      background: linear-gradient(90deg, transparent, #00F0FF, transparent);
      height: 2px;
      width: 30px;
      opacity: 0;
      animation: windStreakAnim 0.6s linear forwards;
    }

    @keyframes windStreakAnim {
      0% {
        transform: translateX(80px);
        opacity: 0;
      }

      20%,
      80% {
        opacity: 0.8;
      }

      100% {
        transform: translateX(-40px);
        opacity: 0;
      }
    }

    /* Automation Nodes */
    .data-packet {
      opacity: 0;
    }

    .hidden-node-icon {
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    @keyframes gearWhirr {
      to {
        transform: rotate(180deg);
      }
    }

    @keyframes shootPacket1 {
      0% {
        transform: translate(0, 0);
        opacity: 1;
        filter: drop-shadow(0 0 4px #FFE500);
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translate(18px, 16px);
        opacity: 0;
      }
    }

    @keyframes shootPacket2 {
      0% {
        transform: translate(0, 0);
        opacity: 1;
        filter: drop-shadow(0 0 4px #00F0FF);
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translate(18px, -24px);
        opacity: 0;
      }
    }

    @keyframes checkDraw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes checkGlow {

      0%,
      100% {
        filter: drop-shadow(0 0 0px #00FF00);
      }

      50% {
        filter: drop-shadow(0 0 12px #00FF00);
        stroke: #00FF00;
      }
    }

    /* Controller */
    .play-triangle {
      transition: opacity 0.2s ease;
    }

    .rec-dot {
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    @keyframes pulseRec {
      0% {
        transform: scale(0.9);
        filter: drop-shadow(0 0 2px #FF0000);
      }

      100% {
        transform: scale(1.1);
        filter: drop-shadow(0 0 8px #FF0000);
      }
    }

    .combo-btn {
      transition: opacity 0.05s ease;
    }

    .combo-btn.pressed {
      opacity: 1 !important;
    }

    .broadcast-waves {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid #FF0000;
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes broadcastEmit {
      0% {
        width: 10px;
        height: 10px;
        opacity: 1;
        border-width: 1.5px;
      }

      100% {
        width: 70px;
        height: 70px;
        opacity: 0;
        border-width: 0.5px;
      }
    }

    /* ═══════════════════════════════════════════════════
   DESKTOP HOVER TRIGGERS (DISABLED ON TOUCHSCREENS)
   ═══════════════════════════════════════════════════ */
    @media (hover: hover) and (pointer: fine) {

      .nav-obj-1:hover .wheel,
      .nav-obj-1:focus-visible .wheel {
        animation: wheelSpin 0.3s linear infinite;
      }

      .nav-obj-2:hover .rgb-glasses,
      .nav-obj-2:focus-visible .rgb-glasses {
        stroke-dasharray: none;
        animation: rgbGlow 1.5s linear infinite !important;
      }

      .nav-obj-2:hover .avatar-hair-group,
      .nav-obj-2:focus-visible .avatar-hair-group {
        animation: hairWave 0.4s ease-in-out infinite alternate;
      }

      .nav-obj-3:hover .default-n1,
      .nav-obj-3:focus-visible .default-n1,
      .nav-obj-3:hover .default-n2,
      .nav-obj-3:focus-visible .default-n2,
      .nav-obj-3:hover .default-n3,
      .nav-obj-3:focus-visible .default-n3 {
        opacity: 0;
        transition: opacity 0.1s;
      }

      .nav-obj-3:hover .hidden-node-icon,
      .nav-obj-3:focus-visible .hidden-node-icon {
        opacity: 1;
      }

      .nav-obj-3:hover .node-2-group,
      .nav-obj-3:focus-visible .node-2-group {
        animation: gearWhirr 0.25s cubic-bezier(0.4, 0, 0.2, 1) 0.25s forwards;
      }

      .nav-obj-3:hover .pkt-1,
      .nav-obj-3:focus-visible .pkt-1 {
        animation: shootPacket1 0.25s linear forwards;
      }

      .nav-obj-3:hover .pkt-2,
      .nav-obj-3:focus-visible .pkt-2 {
        animation: shootPacket2 0.25s linear 0.25s forwards;
      }

      .nav-obj-3:hover .check-icon,
      .nav-obj-3:focus-visible .check-icon {
        stroke-dasharray: 20;
        stroke-dashoffset: 20;
        animation: checkDraw 0.2s ease forwards 0.5s, checkGlow 0.6s ease 0.5s;
      }

      .nav-obj-4:hover .play-triangle,
      .nav-obj-4:focus-visible .play-triangle {
        opacity: 0;
      }

      .nav-obj-4:hover .rec-dot,
      .nav-obj-4:focus-visible .rec-dot {
        opacity: 1;
        animation: pulseRec 0.8s infinite alternate;
      }

      .nav-obj-4:hover .broadcast-waves,
      .nav-obj-4:focus-visible .broadcast-waves {
        animation: broadcastEmit 1s infinite ease-out;
      }
    }

    /* ═══════════════════════════════════════════════════
   MOBILE & TOUCH DEVICE RESPONSIVE LAYOUT
   ═══════════════════════════════════════════════════ */
    @media (pointer: fine) {

      html,
      body,
      #modalLinksContainer a {
        cursor: none;
      }
    }

    @media (max-width: 768px) {
      #mainTitle {
        width: 95vw;
      }

      .nav-obj-1 {
        top: 8%;
        left: 5%;
        transform: scale(0.85);
        animation: none;
      }

      .nav-obj-2 {
        top: 8%;
        right: 5%;
        transform: scale(0.85);
        animation: none;
      }

      .nav-obj-3 {
        bottom: 12%;
        left: 5%;
        transform: scale(0.85);
        animation: none;
      }

      .nav-obj-4 {
        bottom: 12%;
        right: 5%;
        transform: scale(0.85);
        animation: none;
      }

      .corner-tag.top-left,
      .corner-tag.top-right {
        display: none;
      }
    }

    /* ═══════════════════════════════════════════════════
   MODAL OVERLAY & LINKS
   ═══════════════════════════════════════════════════ */
    #modalOverlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }

    #modalOverlay.active {
      pointer-events: all;
      opacity: 1;
    }

    #modalBg {
      position: absolute;
      inset: 0;
      background: rgba(13, 13, 13, 0.82);
      backdrop-filter: blur(6px);
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    #modalOverlay.active #modalBg {
      opacity: 1;
    }

    #modalCard {
      position: relative;
      width: min(88vw, 560px);
      padding: 48px 40px 40px;
      border: 2px solid #333;
      background: #141414;
      transform: scale(0.3);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(.22, 1, .36, 1), opacity 0.45s ease, border-color 0.4s ease;
    }

    #modalOverlay.active #modalCard {
      transform: scale(1);
      opacity: 1;
    }

    #modalCard h2 {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: 0.04em;
    }

    #modalCard p {
      font-size: 0.92rem;
      line-height: 1.65;
      color: #aaa;
      margin-bottom: 20px;
    }

    #modalLinksContainer {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    #modalLinksContainer a {
      display: inline-block;
      padding: 10px 28px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      border: 2px solid var(--btn-accent, #F5F5F5);
      color: var(--btn-accent, #F5F5F5);
      transition: background 0.3s ease, color 0.3s ease;
    }

    #modalLinksContainer a:hover,
    #modalLinksContainer a:focus-visible {
      background: var(--btn-accent, #F5F5F5);
      color: #0D0D0D;
      outline: none;
    }

    #modalClose {
      position: absolute;
      top: 14px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      cursor: inherit;
      color: #666;
      transition: color 0.2s ease, transform 0.3s ease;
    }

    #modalClose:hover,
    #modalClose:focus-visible {
      color: #F5F5F5;
      transform: rotate(90deg);
      outline: none;
    }

    #modalClose svg {
      width: 100%;
      height: 100%;
    }

    #morphCircle {
      position: fixed;
      z-index: 99;
      border-radius: 50%;
      pointer-events: none;
      transform: scale(0);
      opacity: 0;
      transition: transform 0.6s cubic-bezier(.22, 1, .36, 1), opacity 0.3s ease 0.3s;
    }

    #morphCircle.expanding {
      transform: scale(1);
      opacity: 1;
      transition: transform 0.6s cubic-bezier(.22, 1, .36, 1), opacity 0.15s ease;
    }

    /* ═══════════════════════════════════════════════════
   CORNER DECORATIONS
   ═══════════════════════════════════════════════════ */
    .corner-tag {
      position: absolute;
      z-index: 3;
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #444;
      opacity: 0;
      animation: fadeUp 1s ease 3.4s forwards;
    }

    .corner-tag.top-left {
      top: 28px;
      left: 32px;
    }

    .corner-tag.top-right {
      top: 28px;
      right: 32px;
      text-align: right;
    }

    .corner-tag.bottom-left {
      bottom: 28px;
      left: 32px;
    }

    .corner-tag.bottom-right {
      bottom: 28px;
      right: 32px;
      text-align: right;
    }

    .social-row {
      display: flex;
      gap: 18px;
      margin-top: 4px;
    }

    .social-row a {
      color: #666;
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: inherit;
      transition: color 0.3s ease;
    }

    .social-row a:hover,
    .social-row a:focus-visible {
      color: #FFE500;
      outline: none;
    }

    #cursorCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <canvas id="cursorCanvas"></canvas>

  <div id="viewport">
    <canvas id="bgCanvas"></canvas>

    <div class="corner-tag top-left">Portfolio / 2026</div>
    <div class="corner-tag top-right">AI Automation<br>Engineer</div>
    <div class="corner-tag bottom-left">
      <div class="social-row">
        <a href="https://github.com/AvugaddiGirish" target="_blank" rel="noopener">Github</a>
        <a href="https://www.linkedin.com/in/girish-avugaddi-a52812285?utm_source=share_via&utm_content=profile&utm_medium=member_android"
          target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
    <div class="corner-tag bottom-right">Based in India</div>

    <div id="titleWrap">
      <svg id="mainTitle" viewBox="0 0 820 140" aria-label="GIRISH">
        <text class="title-fill" x="410" y="115" text-anchor="middle" font-size="145">GIRISH</text>
        <text class="title-stroke stroke-cyan" x="407" y="112" text-anchor="middle" font-size="145">GIRISH</text>
        <text class="title-stroke stroke-pink" x="413" y="118" text-anchor="middle" font-size="145"
          style="animation-delay: 0.3s, 3.3s">GIRISH</text>
        <text class="title-stroke stroke-yellow" x="410" y="115" text-anchor="middle" font-size="145"
          style="animation-delay: 0.6s, 3.6s">GIRISH</text>
      </svg>
      <span class="subtitle">AI Automation Engineer</span>
    </div>

    <div class="nav-object nav-obj-1" data-section="projects" id="navProjects" tabindex="0" role="button"
      aria-label="Projects">
      <div class="smoke-container" id="f1SmokeContainer"></div>
      <svg viewBox="0 0 80 80">
        <path class="shape-fill" d="M 10 50 L 70 50 L 66 44 L 46 44 L 38 36 L 24 36 L 18 44 L 10 44 Z" />
        <path class="shape-line" d="M 10 50 L 70 50 L 66 44 L 46 44 L 38 36 L 24 36 L 18 44 L 10 44 Z" />
        <path class="shape-line" d="M 10 44 L 10 32 L 20 32" style="animation-delay: 0.2s" />
        <path class="shape-line" d="M 70 50 L 76 48 L 76 45 L 66 45" style="animation-delay: 0.3s" />
        <path class="shape-line" d="M 32 36 Q 38 30 44 38" style="animation-delay: 0.4s" />
        <g class="wheel wheel-rear">
          <circle class="shape-fill" cx="22" cy="50" r="9" />
          <circle class="shape-line" cx="22" cy="50" r="9" style="animation-delay: 0.5s" />
          <line class="shape-line solid-stroke" x1="22" y1="41" x2="22" y2="59" />
          <line class="shape-line solid-stroke" x1="13" y1="50" x2="31" y2="50" />
        </g>
        <g class="wheel wheel-front">
          <circle class="shape-fill" cx="62" cy="50" r="9" />
          <circle class="shape-line" cx="62" cy="50" r="9" style="animation-delay: 0.6s" />
          <line class="shape-line solid-stroke" x1="62" y1="41" x2="62" y2="59" />
          <line class="shape-line solid-stroke" x1="53" y1="50" x2="71" y2="50" />
        </g>
      </svg>
      <span class="nav-label">Projects</span>
    </div>

    <div class="nav-object nav-obj-2" data-section="about" id="navAbout" tabindex="0" role="button" aria-label="About">

    function drawLineBetween(p1, p2) {
      const dx = p2.x - p1.x; const dy = p2.y - p1.y;
      if (Math.abs(dx) < 0.1 && Math.abs(dy) < 0.1) return;

      const grad = cCtx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
      grad.addColorStop(0, p1.color); grad.addColorStop(1, p2.color);

      cCtx.beginPath(); cCtx.moveTo(p1.x, p1.y); cCtx.lineTo(p2.x, p2.y);
      cCtx.strokeStyle = grad; cCtx.lineWidth = 1.5; cCtx.globalAlpha = 0.5;
      cCtx.stroke(); cCtx.globalAlpha = 1.0;
    }

    function animatePipelineCursor() {
      // Safety Rail & Battery Optimization: Abort on mobile or if tab is inactive

      cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
      cursorNodes[0].x += (mouseX - cursorNodes[0].x) * cursorNodes[0].speed;
      cursorNodes[0].y += (mouseY - cursorNodes[0].y) * cursorNodes[0].speed;
      for (let i = 1; i < cursorNodes.length; i++) {
        cursorNodes[i].x += (cursorNodes[i - 1].x - cursorNodes[i].x) * cursorNodes[i].speed;
        cursorNodes[i].y += (cursorNodes[i - 1].y - cursorNodes[i].y) * cursorNodes[i].speed;
      }
      for (let i = 0; i < cursorNodes.length - 1; i++) { drawLineBetween(cursorNodes[i], cursorNodes[i + 1]); }
      cursorNodes.forEach(node => {
        cCtx.beginPath(); cCtx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        cCtx.fillStyle = node.color; cCtx.shadowBlur = 10; cCtx.shadowColor = node.color;
        cCtx.fill(); cCtx.shadowBlur = 0;
      });
      requestAnimationFrame(animatePipelineCursor);
    }
    animatePipelineCursor();

    /* ═══════════════════════════════════════════════════

    let audioCtx;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playRevSound() {
      initAudio();
      const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain(); const filter = audioCtx.createBiquadFilter();
      osc.type = 'sawtooth'; const now = audioCtx.currentTime;
      osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(700, now + 0.4); osc.frequency.exponentialRampToValueAtTime(350, now + 1.2);
      filter.type = 'lowpass'; filter.frequency.setValueAtTime(600, now); filter.frequency.linearRampToValueAtTime(2500, now + 0.4); filter.frequency.linearRampToValueAtTime(800, now + 1.2);
      gainNode.gain.setValueAtTime(0, now); gainNode.gain.linearRampToValueAtTime(0.15, now + 0.1); gainNode.gain.linearRampToValueAtTime(0, now + 1.2);
      osc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 1.2);
    }

    let auraOsc1, auraOsc2, auraGain;
    function startAuraSound() {
      if (auraGain) return; // Prevent orphaned oscillators on double-trigger
      initAudio();
      auraOsc1 = audioCtx.createOscillator(); auraOsc2 = audioCtx.createOscillator(); auraGain = audioCtx.createGain();

      const now = audioCtx.currentTime;
      auraOsc1.frequency.setValueAtTime(110, now); auraOsc1.frequency.linearRampToValueAtTime(180, now + 1.5);
      auraOsc2.frequency.setValueAtTime(112, now); auraOsc2.frequency.linearRampToValueAtTime(184, now + 1.5);
      auraGain.gain.setValueAtTime(0, now); auraGain.gain.linearRampToValueAtTime(0.2, now + 0.5);
      auraOsc1.connect(auraGain); auraOsc2.connect(auraGain); auraGain.connect(audioCtx.destination);
      auraOsc1.start(now); auraOsc2.start(now);
    }

    function stopAuraSound() {
      if (auraGain) {
        const now = audioCtx.currentTime;
        auraGain.gain.cancelScheduledValues(now);
        auraGain.gain.setValueAtTime(auraGain.gain.value, now);

        auraOsc1.stop(now + 0.5); auraOsc2.stop(now + 0.5);
        auraGain = null; // Clear the reference completely
      }
    }

    function playComboSound() {
      initAudio(); const now = audioCtx.currentTime;
      for (let i = 0; i < 10; i++) {
        const time = now + (i * 0.08);
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(300 + Math.random() * 200, time); osc.frequency.exponentialRampToValueAtTime(100, time + 0.02);
        gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.06, time + 0.005); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(time); osc.stop(time + 0.04);
      }
      const shutterTime = now + 0.85;
      const bufferSize = audioCtx.sampleRate * 0.1; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
      const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 3500;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0, shutterTime); gain.gain.linearRampToValueAtTime(0.2, shutterTime + 0.01); gain.gain.linearRampToValueAtTime(0, shutterTime + 0.08);
      gain.gain.linearRampToValueAtTime(0.15, shutterTime + 0.1); gain.gain.linearRampToValueAtTime(0, shutterTime + 0.15);
      noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      noise.start(shutterTime); noise.stop(shutterTime + 0.2);
    }

    let isNodeAnimating = false;
    function playAutomationSound() {
      if (isNodeAnimating) return;
      isNodeAnimating = true;
      setTimeout(() => { isNodeAnimating = false; }, 1000);

      initAudio();
      const now = audioCtx.currentTime;

      const clickOsc = audioCtx.createOscillator(); const clickGain = audioCtx.createGain();
      clickOsc.type = 'square'; clickOsc.frequency.setValueAtTime(1000, now); clickOsc.frequency.exponentialRampToValueAtTime(100, now + 0.05);

      whirrOsc.connect(whirrGain); whirrGain.connect(audioCtx.destination);
      whirrOsc.start(whirrTime); whirrOsc.stop(whirrTime + 0.25);

      const dingTime = now + 0.5;

      dingOsc.connect(dingGain); dingGain.connect(audioCtx.destination);
      dingOsc.start(dingTime); dingOsc.stop(dingTime + 0.6);
    }

    /* ═══════════════════════════════════════════════════

        const depth = 14 + i * 6; const baseTransform = getFloatTransform(obj, performance.now(), i);
        obj.style.transform = `translate(${dx * depth}px, ${dy * depth}px) ${baseTransform}`;
      });
      requestAnimationFrame(animateNav);

    function getFloatTransform(el, t, i) {
      const period = 6000 + i * 1500; const phase = (t % period) / period * Math.PI * 2;
      const yOff = Math.sin(phase) * 10; const rot = Math.sin(phase * 0.7) * 3;
      return `translateY(${yOff}px) rotate(${rot}deg)`;

    const overlay = document.getElementById('modalOverlay');
    const card = document.getElementById('modalCard');
    const mTitle = document.getElementById('modalTitle');
    const mBody = document.getElementById('modalBody');
    const mClose = document.getElementById('modalClose');
    const mBg = document.getElementById('modalBg');
    const morph = document.getElementById('morphCircle');

    function openModal(section, originEl) {
      // Safely clear all running interval particles and sounds to prevent overlap bugs
      clearInterval(smokeInterval);
      clearInterval(auraWindInterval);
      stopControllerFX();
      stopAuraSound();

      const data = SECTIONS[section]; if (!data) return;
      mTitle.textContent = data.title;
      mBody.textContent = data.body;

      const linksContainer = document.getElementById('modalLinksContainer');
      linksContainer.innerHTML = '';

      if (data.linksList) {
        data.linksList.forEach(linkData => {
          const a = document.createElement('a');
          a.href = linkData.url;
          a.textContent = linkData.text;
          a.target = "_blank";
          a.rel = "noopener";
          a.style.setProperty('--btn-accent', data.accent);
          linksContainer.appendChild(a);
        });
      }

      card.style.borderColor = data.accent;
      mTitle.style.color = data.accent;

      const rect = originEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2; const cy = rect.top + rect.height / 2;
      const maxDim = Math.max(window.innerWidth, window.innerHeight) * 2.5;

      morph.style.width = maxDim + 'px'; morph.style.height = maxDim + 'px';
      morph.style.left = (cx - maxDim / 2) + 'px'; morph.style.top = (cy - maxDim / 2) + 'px';
      morph.style.background = data.accent; morph.style.opacity = '0.08';

      requestAnimationFrame(() => {
        morph.classList.add('expanding');
        setTimeout(() => {
          overlay.classList.add('active');
          overlay.setAttribute('aria-hidden', 'false');
          mClose.focus(); // Shift focus to the modal for keyboard users
        }, 250);
      });
    }

    function closeModal() {
      overlay.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
      setTimeout(() => { morph.classList.remove('expanding'); }, 350);
    }

    // Click and Keyboard handlers
    navObjects.forEach(obj => {
      obj.addEventListener('click', () => { openModal(obj.dataset.section, obj); });
      obj.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openModal(obj.dataset.section, obj);
        }
      });
    });

    mClose.addEventListener('click', closeModal);
    mBg.addEventListener('click', closeModal);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && overlay.classList.contains('active')) closeModal();
    });

    /* ═══════════════════════════════════════════════════
       GENERATIVE BACKGROUND — CANVAS
       ═══════════════════════════════════════════════════ */
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const SHAPE_PATHS = [
      new Path2D("M 0.1 0 A 0.1 0.1 0 1 1 -0.1 0 A 0.1 0.1 0 1 1 0.1 0 M 0.1 -0.5 A 0.1 0.1 0 1 1 -0.1 -0.5 A 0.1 0.1 0 1 1 0.1 -0.5 M -0.33 0.25 A 0.1 0.1 0 1 1 -0.53 0.25 A 0.1 0.1 0 1 1 -0.33 0.25 M 0.53 0.25 A 0.1 0.1 0 1 1 0.33 0.25 A 0.1 0.1 0 1 1 0.53 0.25 M 0 -0.1 L 0 -0.4 M -0.08 0.05 L -0.35 0.2 M 0.08 0.05 L 0.35 0.2"),
      new Path2D("M -0.3 -0.2 h 0.5 v 0.6 h -0.2 v -0.4 h -0.3 z M 0.3 0.2 h -0.5 v -0.6 h 0.2 v 0.4 h 0.3 z"),
      new Path2D("M -0.5 0.2 L -0.2 0.5 L 0.5 -0.5 L 0.5 0.5 L -0.2 -0.5 L -0.5 -0.2 Z"),
      new Path2D("M -0.4 -0.4 h 0.8 v 0.8 h -0.8 z M -0.2 -0.4 v -0.2 M 0 -0.4 v -0.2 M 0.2 -0.4 v -0.2 M -0.2 0.4 v 0.2 M 0 0.4 v 0.2 M 0.2 0.4 v 0.2 M -0.4 -0.2 h -0.2 M -0.4 0 h -0.2 M -0.4 0.2 h -0.2 M 0.4 -0.2 h 0.2 M 0.4 0 h 0.2 M 0.4 0.2 h 0.2"),
      new Path2D("M -0.2 -0.5 L -0.6 0 L -0.2 0.5 M 0.2 -0.5 L 0.6 0 L 0.2 0.5"),
      new Path2D("M -0.4 -0.5 L 0.5 0 L -0.4 0.5 Z")
    ];

    const PARTICLE_COUNT = 70;
    const COLORS = ['#FFE500', '#FF2D6B', '#00F0FF', '#F5F5F5'];

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;

        this.type = Math.floor(Math.random() * 6);
        this.size = 6 + Math.random() * 8;

        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.alpha = 0.1 + Math.random() * 0.2;
        this.rot = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.015;
        this.parallaxDepth = 0.3 + Math.random() * 0.7;
      }
      update() {
        this.x += this.vx; this.y += this.vy; this.rot += this.rotSpeed;
        if (this.x < -40) this.x = W + 40; if (this.x > W + 40) this.x = -40;
        if (this.y < -40) this.y = H + 40; if (this.y > H + 40) this.y = -40;
      }
      draw(ctx, mx, my) {
        const cx = W / 2, cy = H / 2;
        const dx = (mx - cx) / cx * 20 * this.parallaxDepth;
        const dy = (my - cy) / cy * 20 * this.parallaxDepth;
        const px = this.x + dx;
        const py = this.y + dy;

        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.strokeStyle = this.color;
        ctx.fillStyle = this.color;

        ctx.translate(px, py);
        ctx.rotate(this.rot);
        ctx.scale(this.size, this.size);

        ctx.lineWidth = 1.5 / this.size;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        ctx.stroke(SHAPE_PATHS[this.type]);
        if (this.type !== 0 && this.type !== 4) {
          ctx.globalAlpha = this.alpha * 0.35;
          ctx.fill(SHAPE_PATHS[this.type]);
        }
        ctx.restore();
      }
    }

    const particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());

    function drawGrid() {
      ctx.strokeStyle = 'rgba(245,245,245,0.025)'; ctx.lineWidth = 0.5; const gap = 60;
      for (let x = 0; x < W; x += gap) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = 0; y < H; y += gap) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    }

    function renderBg() {
      // Battery Optimization: Only render when tab is actively viewed
      if (isTabActive) {
        ctx.clearRect(0, 0, W, H); drawGrid();
        particles.forEach(p => { p.update(); p.draw(ctx, mouseX, mouseY); });
      }
      requestAnimationFrame(renderBg);
    }
    renderBg();

    // Extra accessibility hidden hotkeys map
    document.addEventListener('keydown', e => {
      if (overlay.classList.contains('active')) return;
      const map = { '1': 'projects', '2': 'about', '3': 'contact', '4': 'links' };
      const section = map[e.key]; if (section) { const el = document.querySelector(`[data-section="${section}"]`); if (el) openModal(section, el); }
    });
  </script>
</body>

</html>
